name: Docker to ECR (auto v1, v2, v3...)

on:
  schedule:
    - cron: '29 2 * * *'
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  AWS_REGION: us-west-2
  ECR_REGISTRY: 742138475123.dkr.ecr.us-west-2.amazonaws.com
  ECR_REPOSITORY: demo-private/ui

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Required for AWS CLI + ECR login + ECR describe-images
      - name: Configure AWS credentials
        if: github.event_name != 'pull_request'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: github.event_name != 'pull_request'
        uses: aws-actions/amazon-ecr-login@v2

      # Compute next version tag: v1, v2, v3...
      - name: Compute next version tag
        id: ver
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          set -euo pipefail

          REPO="${ECR_REPOSITORY}"

          # Get all image tags, filter v<number>, find max, increment
          TAGS_JSON="$(aws ecr describe-images \
            --repository-name "$REPO" \
            --query 'imageDetails[].imageTags[]' \
            --output json 2>/dev/null || echo '[]')"

          # Extract numeric part from tags like v12
          MAX_VER="$(echo "$TAGS_JSON" | jq -r '.[]? | select(test("^v[0-9]+$")) | sub("^v"; "")' | sort -n | tail -1)"
          if [[ -z "${MAX_VER:-}" ]]; then
            NEXT="v1"
          else
            NEXT="v$((MAX_VER + 1))"
          fi

          echo "Next version: $NEXT"
          echo "next=$NEXT" >> "$GITHUB_OUTPUT"

      # Build and push (only on non-PR)
      - name: Build and push Docker image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: ./src/ui
          file: ./src/ui/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ steps.ver.outputs.next }}
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build only on PR (no push)
      - name: Build Docker image (PR - no push)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: ./src/ui
          file: ./src/ui/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
